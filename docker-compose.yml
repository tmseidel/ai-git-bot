services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DATABASE_URL: jdbc:postgresql://db:5432/giteabot
      DATABASE_USERNAME: ${DATABASE_USERNAME:-giteabot}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-giteabot}
      # Encryption key for API keys stored in database (optional, but recommended for production)
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
      # Optional agent prompt context limits; reduce these for small local LLM context windows
      AGENT_CONTEXT_MAX_TREE_FILES: ${AGENT_CONTEXT_MAX_TREE_FILES:-500}
      AGENT_CONTEXT_MAX_ISSUE_COMMENTS: ${AGENT_CONTEXT_MAX_ISSUE_COMMENTS:-50}
      AGENT_CONTEXT_MAX_ISSUE_COMMENTS_CHARS: ${AGENT_CONTEXT_MAX_ISSUE_COMMENTS_CHARS:-20000}
      AGENT_CONTEXT_MAX_SINGLE_ISSUE_COMMENT_CHARS: ${AGENT_CONTEXT_MAX_SINGLE_ISSUE_COMMENT_CHARS:-4000}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: giteabot
      POSTGRES_USER: ${DATABASE_USERNAME:-giteabot}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-giteabot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-giteabot}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
