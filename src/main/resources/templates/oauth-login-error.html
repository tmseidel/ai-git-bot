<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>OAuth sign-in failed - AI Git Bot</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}"/>
    <script th:src="@{/js/theme-init.js}"></script>
</head>
<body class="bg-body-tertiary">
    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-body p-4 text-center">
                    <img th:src="@{/images/favicon.png}" alt="AI Git Bot logo" width="64" height="64" class="mb-2 brand-icon"/>
                    <h3 class="mt-2">OAuth sign-in failed</h3>
                    <p class="alert alert-danger mt-3" role="alert" th:text="${error}"></p>
                    <a class="btn btn-primary" th:href="@{/oauth2/authorization/giteabot}">
                        <i class="bi bi-arrow-repeat"></i> Try again
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
