<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:replace="~{layout :: layout(${mcpConfiguration.id != null ? 'Edit MCP Configuration' : 'New MCP Configuration'}, ~{::pageContent})}">
    <div th:fragment="pageContent">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="bi bi-diagram-3"></i>
                <span th:if="${mcpConfiguration.id != null}">Edit MCP Configuration</span>
                <span th:if="${mcpConfiguration.id == null}">New MCP Configuration</span>
            </h2>
            <a th:if="${mcpConfiguration.id != null}"
               th:href="@{/system-settings/mcp-configurations/{id}/tools(id=${mcpConfiguration.id})}"
               class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-tools"></i> Select tools
            </a>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="@{/system-settings/mcp-configurations/save}" method="post" th:object="${mcpConfiguration}">
                    <input type="hidden" th:if="${mcpConfiguration.id != null}" th:field="*{id}"/>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" th:field="*{name}"
                                   placeholder="e.g. GitHub MCP" required/>
                        </div>

                        <div class="col-12">
                            <label for="jsonContent" class="form-label">MCP JSON</label>
                            <textarea class="form-control font-monospace" id="jsonContent" th:field="*{jsonContent}"
                                      rows="14" required
                                      placeholder='{"name":"github","type":"url","url":"https://example.com/mcp"}'></textarea>
                            <div class="form-text">
                                Enter a remote/network MCP configuration. Local <code>stdio</code> transports are rejected.
                            </div>
                        </div>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> Save and select tools
                        </button>
                        <a th:href="@{/system-settings}" class="btn btn-secondary ms-2">
                            <i class="bi bi-x-lg"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
</body>
</html>
