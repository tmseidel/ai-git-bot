<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout :: layout('Workflow selection', ~{::pageContent})}">
    <div th:fragment="pageContent">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="bi bi-diagram-3"></i>
                Workflows for &laquo;<span th:text="${workflowConfiguration.name}"></span>&raquo;
            </h2>
            <a th:href="@{/system-settings}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Back to System settings
            </a>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <p class="text-muted">
            Tick the PR workflows that should run on every pull-request webhook for bots
            using this configuration. Workflows are executed sequentially in stable order
            (lexicographic by workflow key).
        </p>

        <form th:action="@{/system-settings/workflow-configurations/{id}/workflows/save(id=${workflowConfiguration.id})}"
              method="post">

            <div th:if="${#lists.isEmpty(workflows)}" class="alert alert-warning">
                No PR workflows are currently registered in the application.
            </div>

            <div th:each="row : ${workflows}" class="card mb-3">
                <div class="card-body">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox"
                               name="selectedWorkflowKeys"
                               th:value="${row.workflowKey}"
                               th:checked="${row.selected}"
                               th:id="'wf-' + ${row.workflowKey}"/>
                        <label class="form-check-label" th:for="'wf-' + ${row.workflowKey}">
                            <strong th:text="${row.displayName}"></strong>
                            <code class="ms-2 text-muted" th:text="${row.workflowKey}"></code>
                            <span class="badge bg-light text-dark ms-2" th:text="${row.category}"></span>
                            <span th:if="${row.prWorkflow == null}" class="badge bg-warning ms-2">Not registered</span>
                        </label>
                    </div>

                    <div th:if="${row.prWorkflow != null and !row.prWorkflow.paramsSchema().empty}"
                         class="mt-3 ps-4">
                        <div th:each="field : ${row.prWorkflow.paramsSchema().fields()}" class="mb-2"
                             th:with="persisted=${row.persistedParams != null ? row.persistedParams.get(field.name) : null},
                                      currentValue=${persisted != null ? persisted : field.defaultValue},
                                      booleanChecked=${persisted != null ? (persisted == 'true') : (field.defaultValue != null and field.defaultValue == 'true')}">
                            <label class="form-label" th:for="'param-' + ${row.workflowKey} + '-' + ${field.name}">
                                <span th:text="${field.label}"></span>
                                <span th:if="${field.required}" class="text-danger">*</span>
                            </label>
                            <textarea th:if="${field.type.name() == 'TEXT'}"
                                      class="form-control"
                                      rows="3"
                                      th:id="'param-' + ${row.workflowKey} + '-' + ${field.name}"
                                      th:name="|params.${row.workflowKey}.${field.name}|"
                                      th:text="${currentValue}"></textarea>
                            <input th:if="${field.type.name() == 'BOOLEAN'}"
                                   type="hidden"
                                   th:name="|params.${row.workflowKey}.${field.name}|"
                                   value="false"/>
                            <div th:if="${field.type.name() == 'BOOLEAN'}" class="form-check">
                                <input class="form-check-input" type="checkbox" value="true"
                                       th:id="'param-' + ${row.workflowKey} + '-' + ${field.name}"
                                       th:name="|params.${row.workflowKey}.${field.name}|"
                                       th:checked="${booleanChecked}"/>
                            </div>
                            <input th:if="${field.type.name() == 'INTEGER'}"
                                   type="number" class="form-control"
                                   th:id="'param-' + ${row.workflowKey} + '-' + ${field.name}"
                                   th:name="|params.${row.workflowKey}.${field.name}|"
                                   th:value="${currentValue}"/>
                            <input th:if="${field.type.name() == 'SECRET'}"
                                   type="password" class="form-control"
                                   th:id="'param-' + ${row.workflowKey} + '-' + ${field.name}"
                                   th:name="|params.${row.workflowKey}.${field.name}|"
                                   th:placeholder="${persisted != null ? '(unchanged)' : ''}"
                                   autocomplete="off"/>
                            <input th:if="${field.type.name() == 'STRING'}"
                                   type="text" class="form-control"
                                   th:id="'param-' + ${row.workflowKey} + '-' + ${field.name}"
                                   th:name="|params.${row.workflowKey}.${field.name}|"
                                   th:value="${currentValue}"/>
                            <div class="form-text" th:if="${field.description}" th:text="${field.description}"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Save selection
                </button>
                <a th:href="@{/system-settings}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>

    </div>
</div>
</body>
</html>
