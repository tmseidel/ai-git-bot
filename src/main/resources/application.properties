spring.application.name=AI Git Bot

# Prompts
prompts.dir=${PROMPTS_DIR:prompts}
prompts.definitions.default.file=${PROMPTS_DEFAULT_FILE:default.md}
prompts.definitions.agent.file=${PROMPTS_AGENT_FILE:agent.md}
prompts.definitions.local-llm.file=${PROMPTS_LOCAL_LLM_FILE:local-llm.md}

# Agent (Issue Implementation)
agent.enabled=${AGENT_ENABLED:true}
agent.max-files=${AGENT_MAX_FILES:20}
agent.branch-prefix=${AGENT_BRANCH_PREFIX:ai-agent/}
# Maximum chars of file content in prompts (reduce for local models with smaller context)
# For cloud providers (Claude/GPT-4): 100000
# For local models with 16k context: 20000
agent.max-file-content-chars=${AGENT_MAX_FILE_CONTENT_CHARS:100000}
# Agent prompt context limits
agent.context.max-tree-files=${AGENT_CONTEXT_MAX_TREE_FILES:500}
agent.context.max-issue-comments=${AGENT_CONTEXT_MAX_ISSUE_COMMENTS:50}
agent.context.max-issue-comments-chars=${AGENT_CONTEXT_MAX_ISSUE_COMMENTS_CHARS:20000}
agent.context.max-single-issue-comment-chars=${AGENT_CONTEXT_MAX_SINGLE_ISSUE_COMMENT_CHARS:4000}
# agent.allowed-repos=owner/repo1,owner/repo2

# Agent Validation (iterative error correction)
agent.validation.enabled=${AGENT_VALIDATION_ENABLED:true}
# Agent budget limits (to prevent infinite loops and excessive API usage)
agent.budget.max-context-rounds=${AGENT_BUDGET_MAX_CONTENT_ROUNDS:5}
agent.budget.max-rounds=${AGENT_BUDGET_MAX_ROUNDS:10}
agent.budget.max-context-tool-requests-per-round=${AGENT_BUDGET_MAX_CONTEXT_TOOL_REQUESTS_PER_ROUND:10}
agent.budget.max-tokens-per-call=${AGENT_BUDGET_MAX_TOKENS_PER_CALL:16384}
agent.budget.max-validation-retries=${AGENT_BUDGET_MAX_VALIDATION_RETRIES:3}

# Review Context Enrichment (controls how much context is sent to the AI alongside the diff)
review.context.max-file-content-chars=${REVIEW_MAX_FILE_CONTENT_CHARS:30000}
review.context.max-single-file-chars=${REVIEW_MAX_SINGLE_FILE_CHARS:10000}
review.context.max-tree-files=${REVIEW_MAX_TREE_FILES:500}
review.context.max-commit-messages=${REVIEW_MAX_COMMIT_MESSAGES:50}

# Database (H2 file-based for local development; override with PostgreSQL for production)
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/giteabot;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Flyway database migrations
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration/{vendor}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=false
management.info.build.enabled=true
management.info.java.enabled=false
management.info.os.enabled=false

# Info
info.app.name=${spring.application.name}

# Encryption (if not set, API keys are stored unencrypted - set this for production!)
app.encryption-key=${APP_ENCRYPTION_KEY:}

# Auto-login (e2e / preview environments ONLY — never enable in production!)
giteabot.security.auto-login.enabled=${GITEABOT_SECURITY_AUTO_LOGIN_ENABLED:false}
giteabot.security.auto-login.username=${GITEABOT_SECURITY_AUTO_LOGIN_USERNAME:admin}
giteabot.security.auto-login.password=${GITEABOT_SECURITY_AUTO_LOGIN_PASSWORD:admin}

# Server
server.port=8080

# Logging - Set to DEBUG to see full project debug output on the console
logging.level.org.remus.giteabot=DEBUG
#logging.level.root=DEBUG
