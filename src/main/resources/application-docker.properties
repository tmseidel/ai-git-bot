spring.application.name=AI Git Bot

# Prompts
prompts.dir=${PROMPTS_DIR:/app/prompts}
prompts.definitions.default.file=${PROMPTS_DEFAULT_FILE:default.md}

# Agent prompt context limits
agent.context.max-tree-files=${AGENT_CONTEXT_MAX_TREE_FILES:500}
agent.context.max-issue-comments=${AGENT_CONTEXT_MAX_ISSUE_COMMENTS:50}
agent.context.max-issue-comments-chars=${AGENT_CONTEXT_MAX_ISSUE_COMMENTS_CHARS:20000}
agent.context.max-single-issue-comment-chars=${AGENT_CONTEXT_MAX_SINGLE_ISSUE_COMMENT_CHARS:4000}

# Database (PostgreSQL for production)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://db:5432/giteabot}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:giteabot}
spring.datasource.password=${DATABASE_PASSWORD:giteabot}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway database migrations
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration/{vendor}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Server
server.port=8080

# Public base URL of the bot (used e.g. as callback URL for CI deployment workflows).
app.public-url=${APP_PUBLIC_URL:http://localhost:8080}

# Logging - Set to DEBUG to see full AI communication
logging.level.org.remus.giteabot.ai=DEBUG
logging.level.org.remus.giteabot.agent=DEBUG
