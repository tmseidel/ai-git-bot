spring.application.name=AI Git Bot Test

# Prompts
prompts.dir=${java.io.tmpdir}/test-prompts
prompts.definitions.default.file=default.md

# Agent
agent.enabled=false
agent.max-files=10
agent.branch-prefix=ai-agent/

# Database (H2 in-memory for tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
# Run src/test/resources/data.sql AFTER Hibernate created the schema so we
# can seed the mandatory Default bot tool configuration (production seeds it
# via Flyway V12, which is disabled below for tests).
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Flyway disabled for tests (Hibernate manages schema with create-drop)
spring.flyway.enabled=false

# Encryption
app.encryption-key=test-encryption-key-for-tests

# Review Chunking (test defaults match production)
review.chunking.max-diff-chars-per-chunk=120000
review.chunking.max-diff-chunks=8
review.chunking.retry-truncated-chunk-chars=60000

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=${PROMETHEUS_ENABLED:false}
management.endpoint.health.show-details=never
