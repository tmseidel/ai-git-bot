# Docker Compose for local GitLab CE instance (system testing)
#
# Usage:
#   docker compose -f systemtest/docker-compose-local-gitlab.yml up -d
#
# GitLab CE will be available at http://localhost:8929
# SSH access on port 2224
#
# First start takes several minutes while GitLab initializes.
# The root password is set via GITLAB_ROOT_PASSWORD (default: ChangeMe123!).
#
# After GitLab is running:
# 1. Start the bot on the host: mvn spring-boot:run  (must be running on port 8080)
# 2. Log in as root at http://localhost:8929
# 3. Create a bot user (e.g., ai_bot)
# 4. Create a Personal Access Token with api + read_repository scopes
# 5. Create a test project and configure a webhook pointing to
#    http://host.docker.internal:8080/api/webhook/{your-bot-webhook-secret}
#    (note: http:// with a single colon, and /webhook/ is singular)
# 6. Create a merge request to trigger the bot
#
# GitLab CI (CI_ACTION deployment strategy):
#   GitLab CE has CI/CD enabled out of the box, but pipelines stay queued
#   forever unless at least one runner is registered. This compose file
#   ships a `gitlab-runner` sidecar; register it ONCE after GitLab is
#   reachable:
#     1. In the UI: Admin Area → CI/CD → Runners → "New instance runner"
#        (pick a tag like `docker`) and copy the registration token.
#     2. Then run:
#          docker compose -f systemtest/docker-compose-local-gitlab.yml \
#            exec gitlab-runner gitlab-runner register \
#              --non-interactive \
#              --url http://gitlab.local:8929 \
#              --token <TOKEN> \
#              --executor docker \
#              --docker-image alpine:3.20 \
#              --docker-network-mode gitlab_gitlab
#     3. The runner now picks up jobs; the bot's CI_ACTION dispatches
#        (pipeline trigger tokens) actually execute.
#
#   See doc/PR_WORKFLOWS_CI_ACTIONS.md § "GitLab CI" for the full recipe.

services:
  gitlab:
    image: gitlab/gitlab-ce:18.8.9-ce.0
    container_name: gitlab
    hostname: gitlab.local
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:8929'
        gitlab_rails['gitlab_shell_ssh_port'] = 2224
        # Reduce resource usage for local testing
        puma['worker_processes'] = 2
        sidekiq['concurrency'] = 5
        prometheus_monitoring['enable'] = false
        # Allow webhooks to local network (for reaching the bot on host)
        gitlab_rails['allow_local_requests_from_web_hooks_and_services'] = true
        gitlab_rails['outbound_local_requests_allowlist'] = ['host.docker.internal', '172.0.0.0/8', '192.168.0.0/16', '10.0.0.0/8']
      GITLAB_ROOT_PASSWORD: ${GITLAB_ROOT_PASSWORD:-ChangeMe123!}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - gitlab
    ports:
      - "8929:8929"
      - "2224:22"
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
    shm_size: '256m'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8929/-/readiness"]
      interval: 30s
      timeout: 10s
      start_period: 300s
      retries: 10

  # GitLab Runner — executes the pipelines triggered by the bot's
  # CI_ACTION deployment strategy. Has to be registered ONCE after
  # GitLab is up (see header comment); the registration is persisted
  # in the `gitlab_runner_config` volume.
  gitlab-runner:
    image: gitlab/gitlab-runner:v17.5.2
    container_name: gitlab-runner
    restart: unless-stopped
    depends_on:
      - gitlab
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "gitlab.local:host-gateway"
    networks:
      - gitlab
    volumes:
      - gitlab_runner_config:/etc/gitlab-runner
      # Runner spawns one container per job — share the host Docker
      # socket so those job containers run on the same engine.
      - /var/run/docker.sock:/var/run/docker.sock

networks:
  gitlab:
    driver: bridge

volumes:
  gitlab_config:
  gitlab_logs:
  gitlab_data:
  gitlab_runner_config:
