# M4 wave-2 end-to-end recipe — boots a tiny sample app at
# http://sample-e2e-app:3000 so an AI-Git-Bot instance configured with a
# `StaticPreviewUrlStrategy` deployment target (URL template
# `http://sample-e2e-app:3000` and healthz probe path `/healthz`) can drive
# the full `e2e-test` workflow against a deterministic target.
#
# Usage:
#   docker compose -f systemtest/docker-compose-e2e-sample.yml up --build
#
# Pair this with one of the existing compose files (e.g.
# docker-compose-local-gitea.yml) by joining the same Docker network, or
# point an already-running AI-Git-Bot at the exposed port 3030 on the
# host.
services:
  sample-e2e-app:
    build:
      context: ./sample-e2e-app
    image: ai-git-bot/sample-e2e-app:dev
    container_name: ai-git-bot-sample-e2e-app
    ports:
      - "3030:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ai-git-bot-e2e

networks:
  ai-git-bot-e2e:
    name: ai-git-bot-e2e
    driver: bridge

